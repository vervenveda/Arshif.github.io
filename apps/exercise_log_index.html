<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Universal Exercise Log & Workout Tracker</title>
<meta name="color-scheme" content="dark light">
<style>
  :root{
    --bg:#0b1220;
    --panel:#071226;
    /* Increased contrast muted color for readability */
    --muted:#cfeafe; /* lighter, higher contrast on dark bg */
    --accent:#38bdf8;
    --accent-2:#a855f7;
    --ok:#22c55e;
    --warn:#f59e0b;
    --danger:#ef4444;
    --card-bg:linear-gradient(180deg,#071226 0,#061227 100%);
    --radius:12px;
    --pad:14px;
    --font-sans:system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial;
  }
  *{box-sizing:border-box}
  body{
    margin:0;
    font-family:var(--font-sans);
    background:linear-gradient(180deg,#020317 0,#061227 100%);
    color:#e6f0f6;
    -webkit-font-smoothing:antialiased;
    padding:18px;
    min-height:100vh;
  }

  .wrap{ max-width:1100px; margin:0 auto; display:grid; gap:18px; }

  header{ display:flex; gap:18px; align-items:center; justify-content:space-between; flex-wrap:wrap; }
  header h1{ margin:0; font-size:20px; letter-spacing:0.02em; }
  .lead{ color:var(--muted); font-size:14px;}

  .controls-row{ display:flex; gap:8px; flex-wrap:wrap; align-items:center; }

  .card{
    background:var(--card-bg);
    border-radius:var(--radius);
    padding:var(--pad);
    border:1px solid rgba(255,255,255,0.06); /* slightly brighter border */
    box-shadow:0 12px 30px rgba(2,6,20,0.6);
  }

  .grid-two{ display:grid; grid-template-columns: 1fr 420px; gap:18px; }
  @media (max-width:980px){ .grid-two{ grid-template-columns:1fr; } }

  label{ display:block; font-size:13px; color:var(--muted); margin-bottom:6px; }
  input[type="text"], input[type="date"], input[type="time"], input[type="number"], select, textarea{
    width:100%;
    padding:9px 10px;
    border-radius:10px;
    border:1px solid rgba(255,255,255,0.08); /* improved border contrast */
    background:transparent;
    color:inherit;
    font-size:15px;
    outline:none;
  }
  textarea{ min-height:80px; resize:vertical; }

  /* clearer placeholder color */
  input::placeholder, textarea::placeholder {
    color: rgba(207,234,254,0.7);
  }
  select{ color:inherit; }

  .btn{
    background:linear-gradient(90deg,var(--accent),var(--accent-2));
    color:#06101a;
    border:none;
    padding:9px 14px;
    border-radius:999px;
    cursor:pointer;
    font-weight:700;
  }
  .btn.secondary{ background:transparent; color:var(--muted); border:1px solid rgba(255,255,255,0.06); }
  .btn.warn{ background:var(--warn); color:#071227; }
  .btn.danger{ background:var(--danger); color:white; }
  .muted{ color:var(--muted); font-size:13px; }

  .session-list{ display:flex; flex-direction:column; gap:10px; max-height:520px; overflow:auto; padding-right:6px;}
  .session-item{
    display:flex; justify-content:space-between; gap:12px; align-items:center;
    padding:10px; border-radius:10px; background:rgba(255,255,255,0.02);
  }
  .session-item .meta{ font-size:14px; color:#e6f0f6; }
  .session-item small{ color:var(--muted); display:block; font-size:12px; }

  .form-row{ display:grid; grid-template-columns:1fr 140px; gap:10px; align-items:end; }
  @media (max-width:540px){ .form-row{ grid-template-columns:1fr; } }

  .ex-list{ margin-top:12px; display:flex; flex-direction:column; gap:8px; }
  .ex-card{
    border-radius:10px; padding:10px; background:rgba(255,255,255,0.02); display:grid; gap:8px;
    grid-template-columns: 1fr 140px; align-items:start;
  }
  @media (max-width:640px){ .ex-card{ grid-template-columns:1fr; } }

  .sets-row{ display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
  .chip{ padding:6px 10px; border-radius:20px; background:rgba(255,255,255,0.03); font-size:13px; color:#e6f0f6; }

  .small{ font-size:13px; color:var(--muted); }

  table{ width:100%; border-collapse:collapse; margin-top:6px; }
  th,td{ padding:8px; border-bottom:1px dashed rgba(255,255,255,0.03); font-size:14px; text-align:left; color:#e6f0f6; }
  .right{ text-align:right; }

  .actions{ display:flex; gap:8px; flex-wrap:wrap; }

  /* print-friendly */
  @media print{
    body{ color:#000; background:#fff; padding:0; }
    .no-print{ display:none; }
    .card{ box-shadow:none; border:none; background:transparent; padding:0; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div>
      <h1>Universal Exercise Log — Workout Tracker</h1>
      <div class="lead">One tracker for Middle School, High School, and Adult pages. All data stays local unless exported.</div>
    </div>

    <div class="controls-row no-print">
      <label class="muted" style="margin:0 8px 0 0">Profile</label>
      <select id="profileSelect" aria-label="Profile selector">
        <option value="ms">Middle School (ages 11–13)</option>
        <option value="hs">High School (ages 14–18)</option>
        <option value="adult" selected>Adult</option>
      </select>

      <button class="btn" id="newSessionBtn">+ New Session</button>

      <div style="display:flex; gap:8px; align-items:center;">
        <button class="btn secondary" id="exportJSONBtn">Export JSON</button>
        <button class="btn secondary" id="exportCSVBtn">Export CSV</button>
        <button class="btn secondary" id="importJSONBtn">Import</button>
      </div>
    </div>
  </header>

  <section class="grid-two">
    <!-- Left: session editor & history -->
    <div class="card" id="editorCard" aria-live="polite">
      <h3 style="margin-top:0">Session Editor</h3>

      <div id="sessionForm">
        <label>Session name</label>
        <input id="sessName" type="text" placeholder="e.g., Strength Circuit, Field Day, Bike Ride">

        <div class="form-row" style="margin-top:8px">
          <div>
            <label>Session date</label>
            <input id="sessDate" type="date">
          </div>
          <div>
            <label>Duration (min)</label>
            <input id="sessDuration" type="number" min="0" placeholder="30">
          </div>
        </div>

        <label style="margin-top:8px">Notes (optional)</label>
        <textarea id="sessNotes" placeholder="What we did, emphasis, equipment, safety notes..."></textarea>

        <div style="margin-top:10px; display:flex; gap:8px; align-items:center;">
          <button class="btn" id="addExerciseBtn">+ Add Exercise</button>
          <button class="btn secondary" id="saveSessionBtn">Save Session</button>
          <button class="btn secondary" id="clearEditorBtn">Clear</button>
        </div>

        <div class="ex-list" id="exerciseList" aria-live="polite"></div>

        <div style="margin-top:12px; display:flex; justify-content:space-between; align-items:center;">
          <div class="small">Session volume: <strong id="sessionVolume">0</strong> (sum weight×reps where applicable)</div>
          <div class="small">Exercises: <strong id="sessionCount">0</strong></div>
        </div>
      </div>
    </div>

    <!-- Right: history & details -->
    <aside class="card">
      <div style="display:flex; gap:8px; align-items:center; justify-content:space-between;">
        <h3 style="margin:0">History</h3>
        <div style="display:flex; gap:8px; align-items:center;">
          <input id="searchInput" type="text" placeholder="Search sessions..." style="padding:8px; border-radius:10px; border:1px solid rgba(255,255,255,0.06); background:transparent; color:inherit;">
          <select id="sortSelect" aria-label="Sort sessions">
            <option value="date_desc">Newest</option>
            <option value="date_asc">Oldest</option>
            <option value="name_asc">Name A→Z</option>
            <option value="name_desc">Name Z→A</option>
          </select>
        </div>
      </div>

      <div class="session-list" id="sessionList"></div>

      <div style="margin-top:12px; display:flex; gap:8px;">
        <button class="btn secondary" id="clearAllBtn">Clear All (local)</button>
        <button class="btn" id="importFileBtn">Import JSON</button>
      </div>

      <hr style="border:none; height:1px; background:rgba(255,255,255,0.03); margin:12px 0">

      <div id="sessionDetailArea" style="display:none;">
        <h4 id="detailTitle">Session</h4>
        <div id="detailBody"></div>
        <div style="margin-top:10px; display:flex; gap:8px;">
          <button class="btn" id="printSessionBtn">Print Summary</button>
          <button class="btn secondary" id="editSessionBtn">Edit</button>
          <button class="btn danger" id="deleteSessionBtn">Delete</button>
        </div>
      </div>

    </aside>
  </section>
</div>

<!-- hidden file input for import -->
<input id="fileImport" type="file" accept="application/json" style="display:none">

<script>
/* Universal Exercise Log — single-file Vanilla JS
   Storage key and minimal schema:
   - sessions: array of {
       id, name, date(YYYY-MM-DD), duration (min), notes, profile, exercises: [ {id, name, type('reps'|'timed'|'cal'), sets:[{reps,weight,time,notes}], notes } ]
     }
*/

const STORE_KEY = 'wyk_exlog_v1';

// DOM refs
const profileSelect = document.getElementById('profileSelect');
const newSessionBtn = document.getElementById('newSessionBtn');
const exportJSONBtn = document.getElementById('exportJSONBtn');
const exportCSVBtn = document.getElementById('exportCSVBtn');
const importJSONBtn = document.getElementById('importJSONBtn');

const sessName = document.getElementById('sessName');
const sessDate = document.getElementById('sessDate');
const sessNotes = document.getElementById('sessNotes');
const sessDuration = document.getElementById('sessDuration');
const addExerciseBtn = document.getElementById('addExerciseBtn');
const saveSessionBtn = document.getElementById('saveSessionBtn');
const clearEditorBtn = document.getElementById('clearEditorBtn');

const exerciseList = document.getElementById('exerciseList');
const sessionVolume = document.getElementById('sessionVolume');
const sessionCount = document.getElementById('sessionCount');

const sessionList = document.getElementById('sessionList');
const searchInput = document.getElementById('searchInput');
const sortSelect = document.getElementById('sortSelect');

const clearAllBtn = document.getElementById('clearAllBtn');
const importFileBtn = document.getElementById('importFileBtn');
const fileImport = document.getElementById('fileImport');

const sessionDetailArea = document.getElementById('sessionDetailArea');
const detailTitle = document.getElementById('detailTitle');
const detailBody = document.getElementById('detailBody');
const printSessionBtn = document.getElementById('printSessionBtn');
const editSessionBtn = document.getElementById('editSessionBtn');
const deleteSessionBtn = document.getElementById('deleteSessionBtn');

// State
let store = { sessions: [] };
let currentEditingSessionId = null; // null -> new
let exerciseCounter = 0;
let currentDetailSessionId = null;

// Utilities
function uid(prefix='id'){ return prefix + '_' + Math.random().toString(36).slice(2,9); }
function todayISO(){ return new Date().toISOString().slice(0,10); }

function loadStore(){
  try{
    const raw = localStorage.getItem(STORE_KEY);
    store = raw ? JSON.parse(raw) : { sessions: [] };
    if(!store.sessions) store.sessions = [];
  }catch(e){
    console.warn('Load parse error',e);
    store = { sessions: [] };
  }
}
function saveStore(){
  localStorage.setItem(STORE_KEY, JSON.stringify(store));
}

/* Default presets by profile (used when adding empty exercise templates) */
const PRESET_EXERCISES = {
  ms: [
    { name:'Warm-up (dynamic)', type:'timed' },
    { name:'Agility ladder', type:'reps' },
    { name:'Team game - small-sided', type:'timed' }
  ],
  hs: [
    { name:'Warm-up (dynamic)', type:'timed' },
    { name:'Strength: Push (chest/shoulder)', type:'reps' },
    { name:'Sprints / Intervals', type:'timed' }
  ],
  adult: [
    { name:'Warm-up', type:'timed' },
    { name:'Compound lift (squat/deadlift)', type:'reps' },
    { name:'Cardio (steady state)', type:'timed' }
  ]
};

/* Editor actions */
function clearEditor(){
  currentEditingSessionId = null;
  sessName.value = '';
  sessDate.value = todayISO();
  sessDuration.value = '';
  sessNotes.value = '';
  exerciseList.innerHTML = '';
  exerciseCounter = 0;
  updateSessionSummary();
}

function addExercise(ex){
  // ex = { name, type } optional
  exerciseCounter++;
  const id = uid('ex');
  const obj = {
    id, name: ex?.name || '', type: ex?.type || 'reps', notes:'', sets:[/* {reps, weight, time, notes} */]
  };
  renderExerciseCard(obj, true);
  updateSessionSummary();
}

function renderExerciseCard(exObj, focus=false){
  // create DOM card and attach to exerciseList; stores temporary state in data-ex attribute
  const card = document.createElement('div');
  card.className = 'ex-card';
  card.dataset.temp = JSON.stringify(exObj);

  const left = document.createElement('div');
  left.style.minWidth='0';

  const labelRow = document.createElement('div');
  labelRow.style.display='flex';
  labelRow.style.gap='8px';
  labelRow.style.alignItems='center';
  labelRow.innerHTML = `<input type="text" class="ex-name" placeholder="Exercise name" value="${escapeHtml(exObj.name)}" style="font-weight:700"/><select class="ex-type" title="Type"><option value="reps">Reps</option><option value="timed">Timed</option><option value="cal">Calories</option></select>`;

  const notes = document.createElement('textarea');
  notes.className = 'ex-notes';
  notes.placeholder = 'Exercise notes (optional)';
  notes.value = exObj.notes || '';

  left.appendChild(labelRow);
  left.appendChild(notes);

  const right = document.createElement('div');
  right.style.display='flex';
  right.style.flexDirection='column';
  right.style.gap='8px';
  right.style.alignItems='flex-end';

  const setsContainer = document.createElement('div');
  setsContainer.className = 'sets-row';
  setsContainer.style.flexWrap='wrap';

  // render existing sets if present
  (exObj.sets || []).forEach((s,si)=>{
    const chip = buildSetChip(exObj.id, s);
    setsContainer.appendChild(chip);
  });

  const addSetBtn = document.createElement('button');
  addSetBtn.className = 'btn secondary';
  addSetBtn.textContent = '+ Set';
  addSetBtn.onclick = ()=> {
    // show small prompt to add set details
    const set = promptAddSetDialog(exObj.id);
    if(set){
      const chip = buildSetChip(exObj.id, set);
      setsContainer.appendChild(chip);
      // update data stored in card
      updateCardData(card, { addSet:set });
      updateSessionSummary();
    }
  };

  const removeExBtn = document.createElement('button');
  removeExBtn.className = 'btn danger';
  removeExBtn.textContent = 'Remove';
  removeExBtn.onclick = ()=>{
    if(!confirm('Remove this exercise?')) return;
    exerciseList.removeChild(card);
    updateSessionSummary();
  };

  // type selection reflecting passed type
  const typeSelect = labelRow.querySelector('.ex-type');
  typeSelect.value = exObj.type || 'reps';

  // wire updates back to card data when name/type/notes change
  labelRow.querySelector('.ex-name').addEventListener('input', (e)=> updateCardData(card, { name:e.target.value }) );
  typeSelect.addEventListener('change', (e)=> updateCardData(card, { type: e.target.value }) );
  notes.addEventListener('input', (e)=> updateCardData(card, { notes: e.target.value }) );

  right.appendChild(setsContainer);
  const btnRow = document.createElement('div');
  btnRow.style.display='flex';
  btnRow.style.gap='8px';
  btnRow.appendChild(addSetBtn);
  btnRow.appendChild(removeExBtn);
  right.appendChild(btnRow);

  card.appendChild(left);
  card.appendChild(right);

  exerciseList.appendChild(card);

  if(focus) card.scrollIntoView({behavior:'smooth', block:'center'});
}

function promptAddSetDialog(exId){
  // Simple prompt-based set entry: For reps: reps & weight. For timed: time (sec) or mm:ss
  const reps = prompt('Set — reps (leave blank if timed):','10');
  if(reps === null) return null;
  const weight = prompt('Weight (kg or lbs) — leave blank if bodyweight or not used:','');
  const notes = prompt('Notes for this set (optional):','');
  return { reps: reps ? Number(reps) : null, weight: weight ? Number(weight) : null, time: null, notes: notes || '' };
}

function buildSetChip(exId,set){
  const chip = document.createElement('div');
  chip.className = 'chip';
  const repText = (set.reps != null ? `${set.reps} reps` : (set.time ? `${set.time}s` : ''));
  const weightText = (set.weight != null ? ` @ ${set.weight}` : '');
  chip.textContent = repText + weightText;
  const x = document.createElement('button');
  x.className='btn secondary';
  x.textContent='x';
  x.style.padding='4px 8px'; x.onclick = ()=>{
    // remove this chip from DOM and update parent card data
    const parent = chip.parentNode;
    const card = parent.closest('.ex-card');
    removeSetFromCard(card, set);
    parent.removeChild(chip);
    updateSessionSummary();
  };
  chip.appendChild(x);
  return chip;
}

function removeSetFromCard(card,set){
  const data = JSON.parse(card.dataset.temp || '{}');
  data.sets = (data.sets || []).filter(s=> !deepEqual(s,set));
  card.dataset.temp = JSON.stringify(data);
}

function updateCardData(card, patch){
  const data = JSON.parse(card.dataset.temp || '{}');
  if(patch.addSet){
    data.sets = data.sets || [];
    data.sets.push(patch.addSet);
    delete patch.addSet;
  }
  Object.assign(data, patch);
  card.dataset.temp = JSON.stringify(data);
  // update visible badges / counters
}

/* Build session object from editor DOM */
function buildSessionFromEditor(){
  const name = sessName.value.trim() || 'Session';
  const date = sessDate.value || todayISO();
  const duration = Number(sessDuration.value) || null;
  const notes = sessNotes.value || '';
  const profile = profileSelect.value;

  const exCards = Array.from(exerciseList.children);
  const exercises = exCards.map(c=>{
    const data = JSON.parse(c.dataset.temp || '{}');
    // sanitize minimal
    return {
      id: data.id || uid('ex'),
      name: (data.name || '').trim() || 'Exercise',
      type: data.type || 'reps',
      notes: data.notes || '',
      sets: (data.sets || []).map(s=>({ reps: s.reps || null, weight: s.weight || null, time: s.time || null, notes: s.notes || '' }))
    };
  });

  return { id: currentEditingSessionId || uid('sess'), name, date, duration, notes, profile, exercises };
}

/* Import / Export */
function exportJSON(){
  const blob = new Blob([JSON.stringify(store, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `exercise_log_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
}

function exportCSV(){
  // Flatten sessions to CSV rows (one row per exercise set)
  const rows = [['session_id','session_name','date','duration_min','profile','exercise_name','exercise_type','set_reps','set_weight','set_time','notes']];
  store.sessions.forEach(s=>{
    s.exercises.forEach(ex=>{
      if(ex.sets.length === 0){
        rows.push([s.id, s.name, s.date, s.duration||'', s.profile, ex.name, ex.type, '','','', (s.notes||'') ]);
      } else {
        ex.sets.forEach(set=>{
          rows.push([s.id, s.name, s.date, s.duration||'', s.profile, ex.name, ex.type, set.reps||'', set.weight||'', set.time||'', (set.notes||'') ]);
        });
      }
    });
    if(s.exercises.length===0){
      rows.push([s.id, s.name, s.date, s.duration||'', s.profile,'','','','','', (s.notes||'')]);
    }
  });
  const csv = rows.map(r => r.map(v=>`"${String(v||'').replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob([csv], {type:'text/csv'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `exercise_log_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
}

function importJSON(){
  fileImport.click();
}
fileImport.addEventListener('change', (ev)=>{
  const f = ev.target.files && ev.target.files[0];
  if(!f) return;
  const r = new FileReader();
  r.onload = ()=>{
    try{
      const parsed = JSON.parse(r.result);
      if(parsed.sessions && Array.isArray(parsed.sessions)){
        // merge naive: append
        if(confirm('Import will append sessions to your current data. Ok?')){
          store.sessions = store.sessions.concat(parsed.sessions);
          saveStore(); renderSessionList();
          alert('Import complete');
        }
      } else {
        alert('Invalid format (expected { sessions: [] })');
      }
    }catch(e){
      alert('Failed to parse JSON: ' + e);
    }
  };
  r.readAsText(f);
  fileImport.value = '';
});

/* CRUD actions for sessions */
function saveSessionFromEditor(){
  const session = buildSessionFromEditor();
  // replace if editing existing
  const idx = store.sessions.findIndex(s => s.id === session.id);
  if(idx >= 0) store.sessions[idx] = session;
  else store.sessions.unshift(session); // push newest to top
  saveStore();
  clearEditor();
  renderSessionList();
  alert('Session saved locally');
}

function renderSessionList(){
  sessionList.innerHTML = '';
  const q = searchInput.value.trim().toLowerCase();
  const sort = sortSelect.value;
  let list = store.sessions.slice();

  // filter
  if(q){
    list = list.filter(s=>{
      return s.name.toLowerCase().includes(q) || (s.notes||'').toLowerCase().includes(q) || s.exercises.some(ex=> ex.name.toLowerCase().includes(q));
    });
  }
  // sort
  list.sort((a,b)=>{
    if(sort === 'date_desc') return (b.date || '').localeCompare(a.date || '');
    if(sort === 'date_asc') return (a.date || '').localeCompare(b.date || '');
    if(sort === 'name_asc') return a.name.localeCompare(b.name);
    if(sort === 'name_desc') return b.name.localeCompare(a.name);
    return 0;
  });

  if(list.length === 0) {
    sessionList.innerHTML = '<div class="small muted">No sessions yet</div>';
    return;
  }

  list.forEach(s=>{
    const item = document.createElement('div');
    item.className = 'session-item';
    item.tabIndex = 0;
    const left = document.createElement('div');
    left.className = 'meta';
    left.innerHTML = `<strong>${escapeHtml(s.name)}</strong><small>${s.date} · ${s.profile.toUpperCase()} · ${s.exercises.length} ex</small>`;
    const right = document.createElement('div');
    right.style.display='flex'; right.style.gap='8px'; right.style.alignItems='center';
    const viewBtn = document.createElement('button'); viewBtn.className='btn secondary'; viewBtn.textContent='View';
    viewBtn.onclick = ()=> showSessionDetail(s.id);
    const quickBtn = document.createElement('button'); quickBtn.className='btn'; quickBtn.textContent='Copy'; quickBtn.onclick = ()=> {
      // duplicate session and save as new
      const copy = JSON.parse(JSON.stringify(s));
      copy.id = uid('sess');
      copy.name = copy.name + ' (copy)';
      store.sessions.unshift(copy);
      saveStore();
      renderSessionList();
      alert('Session copied');
    };
    right.appendChild(viewBtn); right.appendChild(quickBtn);

    item.appendChild(left); item.appendChild(right);
    // keyboard accessibility
    item.addEventListener('keydown', (e)=>{ if(e.key==='Enter'){ showSessionDetail(s.id); }});
    sessionList.appendChild(item);
  });
}

/* Session detail */
function showSessionDetail(id){
  currentDetailSessionId = id;
  const s = store.sessions.find(x=>x.id===id);
  if(!s) return;
  sessionDetailArea.style.display = 'block';
  detailTitle.textContent = `${s.name} — ${s.date}`;
  // build detail HTML
  let html = `<div class="small">Profile: ${escapeHtml(s.profile)} · Duration: ${s.duration||'n/a'} min</div>`;
  if(s.notes) html += `<p>${escapeHtml(s.notes)}</p>`;
  html += `<h4 style="margin-bottom:6px">Exercises</h4>`;
  if(s.exercises.length===0) html += `<div class="small muted">No exercises recorded</div>`;
  else {
    html += '<table><thead><tr><th>Exercise</th><th>Type</th><th class="right">Sets</th><th class="right">Volume</th></tr></thead><tbody>';
    s.exercises.forEach(ex=>{
      const sets = ex.sets||[];
      const setCount = sets.length;
      const vol = calculateExerciseVolume(ex);
      html += `<tr><td>${escapeHtml(ex.name)}<div class="small">${escapeHtml(ex.notes||'')}</div></td><td>${escapeHtml(ex.type)}</td><td class="right">${setCount}</td><td class="right">${vol}</td></tr>`;
    });
    html += '</tbody></table>';
  }
  detailBody.innerHTML = html;

  // wire buttons: print, edit, delete
  printSessionBtn.onclick = ()=> printSessionSummary(s);
  editSessionBtn.onclick = ()=> { loadSessionIntoEditor(s.id); window.scrollTo({top:0,behavior:'smooth'}); };
  deleteSessionBtn.onclick = ()=> {
    if(!confirm('Delete session permanently?')) return;
    store.sessions = store.sessions.filter(x=>x.id !== s.id);
    saveStore();
    renderSessionList();
    sessionDetailArea.style.display='none';
  };
}

/* Print-friendly session summary */
function printSessionSummary(s){
  const html = buildPrintHTML(s);
  const w = window.open('', '_blank', 'noopener');
  if(!w) return alert('Popup blocked (allow popups to print).');
  w.document.write(html);
  w.document.close();
  setTimeout(()=> w.print(), 350);
}
function buildPrintHTML(s){
  let content = `<h1>${escapeHtml(s.name)}</h1><div>${s.date} · ${escapeHtml(s.profile)} · Duration: ${s.duration||'n/a'} min</div><hr>`;
  content += `<h3>Notes</h3><p>${escapeHtml(s.notes||'')}</p>`;
  content += `<h3>Exercises</h3>`;
  if(!s.exercises || s.exercises.length===0) content += `<p>No exercises</p>`;
  else {
    content += `<table style="width:100%; border-collapse:collapse; font-family:Arial;"><thead><tr><th style="border-bottom:1px solid #ccc;text-align:left">Exercise</th><th style="border-bottom:1px solid #ccc">Sets</th><th style="border-bottom:1px solid #ccc">Volume</th></tr></thead><tbody>`;
    s.exercises.forEach(ex=>{
      content += `<tr><td style="padding:8px 4px;border-bottom:1px solid #eee">${escapeHtml(ex.name)}<div style="font-size:12px;color:#666">${escapeHtml(ex.notes||'')}</div></td><td style="text-align:center">${(ex.sets||[]).length}</td><td style="text-align:right">${calculateExerciseVolume(ex)}</td></tr>`;
    });
    content += `</tbody></table>`;
  }
  return `<!doctype html><html><head><meta charset="utf-8"><title>Session print</title><style>body{font-family:Arial;color:#000;padding:20px}</style></head><body>${content}</body></html>`;
}

/* calculate simple volume: sum(reps * weight) for sets where reps & weight present */
function calculateExerciseVolume(ex){
  let vol = 0;
  (ex.sets || []).forEach(s=>{
    const r = Number(s.reps) || 0;
    const w = Number(s.weight) || 0;
    vol += r * w;
  });
  return vol;
}

/* load session into editor for editing */
function loadSessionIntoEditor(id){
  const s = store.sessions.find(x=>x.id===id);
  if(!s) return;
  currentEditingSessionId = s.id;
  sessName.value = s.name;
  sessDate.value = s.date || todayISO();
  sessDuration.value = s.duration || '';
  sessNotes.value = s.notes || '';
  exerciseList.innerHTML = '';
  (s.exercises || []).forEach(ex=>{
    renderExerciseCard(ex,true);
  });
  updateSessionSummary();
}

/* update session summary: count exercises & volume */
function updateSessionSummary(){
  const cards = Array.from(exerciseList.children);
  let totalVol = 0;
  let count = cards.length;
  cards.forEach(c=>{
    const data = JSON.parse(c.dataset.temp || '{}');
    const vol = calculateExerciseVolume(data);
    totalVol += vol;
  });
  sessionVolume.textContent = String(totalVol);
  sessionCount.textContent = String(count);
}

/* helpers for editing: read data from DOM cards into array of exercise objects */
function readExercisesFromEditor(){
  const cards = Array.from(exerciseList.children);
  return cards.map(c=>{
    const data = JSON.parse(c.dataset.temp || '{}');
    // also sync values from inputs
    const nameInput = c.querySelector('.ex-name');
    const typeInput = c.querySelector('.ex-type');
    const notesInput = c.querySelector('.ex-notes');
    data.name = nameInput ? nameInput.value.trim() : data.name;
    data.type = typeInput ? typeInput.value : data.type;
    data.notes = notesInput ? notesInput.value : data.notes;
    return data;
  });
}

/* Clear everything local */
function clearAllLocal(){
  if(!confirm('Clear all stored sessions from this browser? This cannot be undone.')) return;
  localStorage.removeItem(STORE_KEY);
  loadStore();
  renderSessionList();
  sessionDetailArea.style.display='none';
  alert('All cleared.');
}

/* small utility: HTML escape */
function escapeHtml(s=''){
  return String(s).replace(/[&<>"']/g, function(m){ return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m];});
}

/* deep equality for small objects (used for set removal) */
function deepEqual(a,b){
  return JSON.stringify(a) === JSON.stringify(b);
}

/* UI wiring */
newSessionBtn.addEventListener('click', ()=> {
  clearEditor();
  // prefill profile-aware presets
  (PRESET_EXERCISES[profileSelect.value] || []).forEach(p => addExercise(p));
  window.scrollTo({ top: 0, behavior: 'smooth' });
});
addExerciseBtn.addEventListener('click', ()=> addExercise({ name:'', type:'reps' }));

saveSessionBtn.addEventListener('click', ()=>{
  // read exercises from editor and set their data into temp dataset for final build
  const cards = Array.from(exerciseList.children);
  cards.forEach(c=>{
    const data = JSON.parse(c.dataset.temp || '{}');
    // sync from DOM
    const nameInput = c.querySelector('.ex-name');
    const typeInput = c.querySelector('.ex-type');
    const notesInput = c.querySelector('.ex-notes');
    data.name = nameInput ? nameInput.value.trim() : data.name;
    data.type = typeInput ? typeInput.value : data.type;
    data.notes = notesInput ? notesInput.value : data.notes;
    c.dataset.temp = JSON.stringify(data);
  });

  const session = buildSessionFromEditor();
  // also ensure exercises read directly
  session.exercises = readExercisesFromEditor();
  // save
  const idx = store.sessions.findIndex(s => s.id === session.id);
  if(idx >= 0) store.sessions[idx] = session;
  else store.sessions.unshift(session);
  saveStore();
  clearEditor();
  renderSessionList();
  alert('Saved session locally.');
});

clearEditorBtn.addEventListener('click', ()=> {
  if(confirm('Clear editor? Unsaved changes will be lost.')) clearEditor();
});

searchInput.addEventListener('input', ()=> renderSessionList());
sortSelect.addEventListener('change', ()=> renderSessionList());
exportJSONBtn.addEventListener('click', exportJSON);
exportCSVBtn.addEventListener('click', exportCSV);
importJSONBtn.addEventListener('click', importJSON);

clearAllBtn.addEventListener('click', clearAllLocal);
importFileBtn.addEventListener('click', importJSON);

document.getElementById('fileImport').addEventListener('change', (ev)=>{
  // same handler already registered
});

sessionList.addEventListener('click', (e)=>{/* delegated handled via buttons */});

// when exerciseList changes, update summary (mutation observer optional)
const observer = new MutationObserver(()=> updateSessionSummary());
observer.observe(exerciseList, { childList:true, subtree:true });

// autosave editor state (lightweight)
setInterval(()=> {
  try{
    const editorState = {
      sessName: sessName.value,
      sessDate: sessDate.value,
      sessDuration: sessDuration.value,
      sessNotes: sessNotes.value,
      exercises: Array.from(exerciseList.children).map(c=> JSON.parse(c.dataset.temp||'{}'))
    };
    localStorage.setItem(STORE_KEY + '_editor', JSON.stringify(editorState));
  }catch(e){}
}, 5000);

function restoreEditorFromAutosave(){
  try{
    const raw = localStorage.getItem(STORE_KEY + '_editor');
    if(!raw) return;
    const ed = JSON.parse(raw);
    if(!ed) return;
    sessName.value = ed.sessName || '';
    sessDate.value = ed.sessDate || todayISO();
    sessDuration.value = ed.sessDuration || '';
    sessNotes.value = ed.sessNotes || '';
    exerciseList.innerHTML = '';
    (ed.exercises || []).forEach(ex=> renderExerciseCard(ex,false));
    updateSessionSummary();
  }catch(e){}
}

/* initial load */
(function init(){
  loadStore();
  restoreEditorFromAutosave();
  renderSessionList();
  sessDate.value = sessDate.value || todayISO();
})();

</script>
